<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Creative Portfolio</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

  <div class="container">

    <!-- LEFT MENU -->
    <div class="sidebar">
      <p>Clients</p>
      <p>Research</p>
      <p>Portfolio</p>
      <p>Podcast</p>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card">

     

      <div class="circle-bg"></div>

      <img
        src="https://cdn.prod.website-files.com/660781c75ee2bc7fcef63a23/660a3a740de08fa8f4a6ff99_CTA%20Image.png"
        alt=""
      >

      <div class="profile-content">

        <h3>Im,</h3>

        <h1>
          Jon <br>
          Daniel
        </h1>

        <p>
          inquiry@jondaniel.design
          <i class="fa-solid fa-envelope"></i>
        </p>

      </div>

      <div class="badge">
        DESIGN PORTFOLIO
      </div>

    </div>
     <div  class="top-text">
        ✦ About Me
      </div>

    <!-- RIGHT SECTION -->
    <div class="right-section">

      <!-- TITLE -->
      <h1 class="main-title">
        Portfolio
      </h1>

      <!-- TOP GRID -->
      <div class="top-grid">

        <!-- VIDEO CARD -->
        <div class="video-card">

          <img
            src="bird.jpg"
            alt=""
          >

          <div class="play-btn">
            <i class="fa-solid fa-play"></i>
          </div>

        </div>

        <!-- STATS -->
        <div class="stats-column">

          <div class="stat-card green">
            <h2>251</h2>
            <p>Projects</p>
          </div>

          <div class="stat-card purple">
            <h2>156</h2>
            <p>Awards</p>
          </div>

        </div>

      </div>

      <!-- BOTTOM GRID -->
      <div class="bottom-grid">

        <div class="client-card">
          <i class="fa-brands fa-apple"></i>
          <p>Clients</p>
        </div>

        <div class="ball-card">
          <img class="ball"  src="sphere image.png" alt="">
        </div>

        <div class="award-card">
          <h2>172</h2>
          <p>
            Global Design <br>
            Awards.
          </p>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
